<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Leon Neuhäuser — Portfolio</title>
<link rel="stylesheet" href="colors_and_type.css" />
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg);
    font-family: var(--font-sans);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
  }

  .shell {
    width: 100%;
    max-width: 620px;
    margin: 0 auto;
    padding: 16px 16px 48px;
    display: flex;
    flex-direction: column;
    gap: var(--gap);
  }

  .panel-swap { animation: panelIn var(--dur) var(--ease) both; }
  @keyframes panelIn {
    from { transform: translateY(8px); }
    to   { transform: translateY(0); }
  }

  .logo-marquee {
    overflow: hidden;
    -webkit-mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
            mask-image: linear-gradient(90deg, transparent, #000 8%, #000 92%, transparent);
  }
  .logo-track {
    display: flex;
    align-items: center;
    gap: 48px;
    width: max-content;
    padding: 26px 24px;
    animation: marquee var(--marquee-dur, 26s) linear infinite;
  }
  .logo-track:hover { animation-play-state: paused; }
  .logo-word {
    font: 800 22px/1 var(--font-sans);
    letter-spacing: -0.02em;
    color: var(--ink);
    white-space: nowrap;
  }
  .logo-cell {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    height: 30px;
    width: 116px;
    flex-shrink: 0;
  }
  .logo-img {
    max-height: 100%;
    max-width: 100%;
    width: auto;
    height: auto;
    object-fit: contain;
    filter: grayscale(1);
    opacity: 0.62;
    transition: opacity var(--dur) var(--ease);
    user-select: none;
  }
  .logo-marquee:hover .logo-img { opacity: 0.85; }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }

  .cal-spinner {
    width: 34px; height: 34px; border-radius: 50%;
    border: 3px solid var(--line);
    border-top-color: var(--accent);
    animation: cal-spin 0.8s linear infinite;
  }
  @keyframes cal-spin {
    to { transform: rotate(360deg); }
  }

  @media (max-width: 560px) {
    .contact-grid { grid-template-columns: 1fr !important; }
    .t-display { font-size: 27px !important; }
  }
  @media (prefers-reduced-motion: reduce) {
    .logo-track { animation: none; }
    .panel-swap { animation: none; }
    .cal-spinner { animation-duration: 1.6s; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
