<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CMS — Leon Neuhäuser Portfolio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; }

  :root {
    --bg:        #EBEBEB;
    --surface:   #FFFFFF;
    --surface-2: #F4F4F4;
    --ink:       #0A0A0A;
    --ink-2:     #5E5E5E;
    --ink-3:     #A8A8A8;
    --line:      #E4E4E4;
    --accent:    #2D6BFF;
    --accent-soft: #E2EAFF;
    --r:         16px;
    --font: 'Inter', system-ui, -apple-system, sans-serif;
    --success: #19A36B;
    --danger: #E53935;
  }

  body {
    background: var(--bg);
    font-family: var(--font);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
    display: flex;
    min-height: 100vh;
  }

  /* ── Sidebar ── */
  .sidebar {
    width: 220px;
    min-height: 100vh;
    background: var(--surface);
    border-right: 1px solid var(--line);
    display: flex;
    flex-direction: column;
    position: fixed;
    top: 0; left: 0; bottom: 0;
    z-index: 10;
  }
  .sidebar-head {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--line);
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    font-weight: 700; font-size: 14px; letter-spacing: -0.01em;
  }
  .sidebar-logo svg { flex-shrink: 0; }
  .sidebar-sub { font-size: 11px; color: var(--ink-3); margin-top: 4px; letter-spacing: 0.04em; text-transform: uppercase; }
  .sidebar-nav { flex: 1; padding: 12px 10px; display: flex; flex-direction: column; gap: 2px; overflow-y: auto; }
  .nav-group-label {
    font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--ink-3); padding: 10px 10px 4px;
  }
  .nav-btn {
    display: flex; align-items: center; gap: 10px;
    width: 100%; padding: 9px 10px; border: none; border-radius: 10px;
    background: transparent; color: var(--ink-2); font: 500 13px/1.3 var(--font);
    cursor: pointer; text-align: left; transition: background 120ms, color 120ms;
  }
  .nav-btn:hover { background: var(--surface-2); color: var(--ink); }
  .nav-btn.active { background: var(--accent-soft); color: var(--accent); font-weight: 600; }
  .nav-btn svg { flex-shrink: 0; opacity: 0.7; }
  .nav-btn.active svg { opacity: 1; }
  .sidebar-footer {
    padding: 16px;
    border-top: 1px solid var(--line);
    display: flex; flex-direction: column; gap: 8px;
  }
  .btn-primary {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 11px 16px; border: none; border-radius: 10px;
    background: var(--accent); color: #fff; font: 600 13px/1 var(--font);
    cursor: pointer; transition: background 120ms;
  }
  .btn-primary:hover { background: #1A52E0; }
  .btn-secondary {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    width: 100%; padding: 9px 16px; border: 1px solid var(--line); border-radius: 10px;
    background: transparent; color: var(--ink-2); font: 500 13px/1 var(--font);
    cursor: pointer; transition: background 120ms;
    text-decoration: none;
  }
  .btn-secondary:hover { background: var(--surface-2); color: var(--ink); }

  /* ── Main content area ── */
  .main {
    margin-left: 220px;
    flex: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .topbar {
    position: sticky; top: 0; z-index: 5;
    background: rgba(235,235,235,0.88);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--line);
    padding: 14px 32px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
  }
  .topbar-title { font-size: 16px; font-weight: 700; letter-spacing: -0.01em; }
  .topbar-actions { display: flex; align-items: center; gap: 10px; }
  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ink); color: #fff; font: 500 13px/1 var(--font);
    padding: 12px 20px; border-radius: 10px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.2);
    z-index: 1000; pointer-events: none;
    opacity: 0; transition: opacity 200ms;
  }
  .toast.visible { opacity: 1; }

  .content { padding: 32px; max-width: 760px; }

  /* ── Form elements ── */
  .section { margin-bottom: 40px; }
  .section-title {
    font-size: 13px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--ink-3); margin-bottom: 16px; padding-bottom: 10px;
    border-bottom: 1px solid var(--line);
  }
  .card {
    background: var(--surface); border-radius: var(--r);
    border: 1px solid var(--line); padding: 24px;
    margin-bottom: 12px;
  }
  .card-title {
    font-size: 14px; font-weight: 600; margin-bottom: 16px; color: var(--ink);
  }
  .field { margin-bottom: 16px; }
  .field:last-child { margin-bottom: 0; }
  .field-label {
    display: block; font-size: 12px; font-weight: 600;
    color: var(--ink-2); margin-bottom: 6px; letter-spacing: 0.02em;
  }
  .field-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  input[type="text"], input[type="url"], input[type="email"], textarea, select {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--line); border-radius: 10px;
    background: var(--surface-2); color: var(--ink);
    font: 400 14px/1.4 var(--font);
    outline: none; transition: border-color 120ms;
    resize: vertical;
    appearance: none;
  }
  input[type="text"]:focus, input[type="url"]:focus, input[type="email"]:focus,
  textarea:focus, select:focus {
    border-color: var(--accent); background: #fff;
  }
  textarea { min-height: 80px; }
  textarea.tall { min-height: 120px; }
  .hint { font-size: 11px; color: var(--ink-3); margin-top: 5px; }

  /* ── Tag / chip inputs ── */
  .tags-input {
    display: flex; flex-wrap: wrap; gap: 6px;
    padding: 8px; border: 1px solid var(--line); border-radius: 10px;
    background: var(--surface-2); min-height: 44px; cursor: text;
    transition: border-color 120ms;
  }
  .tags-input:focus-within { border-color: var(--accent); background: #fff; }
  .tag-chip {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 4px 10px; border-radius: 999px;
    background: var(--accent-soft); color: var(--accent);
    font: 500 12px/1 var(--font); white-space: nowrap;
  }
  .tag-chip button {
    border: none; background: none; color: inherit; cursor: pointer;
    padding: 0; font-size: 14px; line-height: 1; opacity: 0.7;
  }
  .tag-chip button:hover { opacity: 1; }
  .tags-input input {
    border: none; background: transparent; outline: none; padding: 4px 4px;
    font: 400 13px/1 var(--font); color: var(--ink); min-width: 80px; flex: 1;
  }

  /* ── Logo list ── */
  .logo-row {
    display: grid; grid-template-columns: 1fr 2fr auto; gap: 8px;
    align-items: center; margin-bottom: 8px;
  }
  .logo-row:last-child { margin-bottom: 0; }
  .btn-icon {
    display: flex; align-items: center; justify-content: center;
    width: 34px; height: 34px; border: 1px solid var(--line); border-radius: 8px;
    background: transparent; color: var(--ink-3); cursor: pointer; flex-shrink: 0;
    transition: background 120ms, color 120ms;
  }
  .btn-icon:hover { background: var(--surface-2); color: var(--danger); }
  .btn-add {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border: 1px dashed var(--line); border-radius: 10px;
    background: transparent; color: var(--ink-3); font: 500 13px/1 var(--font);
    cursor: pointer; width: 100%; transition: border-color 120ms, color 120ms;
    margin-top: 8px;
  }
  .btn-add:hover { border-color: var(--accent); color: var(--accent); }

  /* ── Testimonials / List items ── */
  .list-item {
    background: var(--surface-2); border-radius: 12px; padding: 16px;
    margin-bottom: 10px; position: relative;
  }
  .list-item-head {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 12px;
  }
  .list-item-label { font-size: 13px; font-weight: 600; color: var(--ink); }
  .list-item-actions { display: flex; gap: 6px; }

  /* ── Case study nested editor ── */
  .approach-group { background: var(--bg); border-radius: 10px; padding: 14px; margin-bottom: 8px; }
  .approach-group-head { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .bullet-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
  .bullet-row input { flex: 1; }

  /* ── Tabs within case editor ── */
  .case-tabs { display: flex; gap: 4px; margin-bottom: 20px; flex-wrap: wrap; }
  .case-tab {
    padding: 7px 14px; border: 1px solid var(--line); border-radius: 999px;
    background: transparent; color: var(--ink-2); font: 500 12px/1 var(--font);
    cursor: pointer; transition: all 120ms; white-space: nowrap;
  }
  .case-tab.active { background: var(--ink); color: #fff; border-color: var(--ink); }

  /* ── Image upload cards ── */
  .img-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 14px;
  }
  .img-card {
    background: var(--surface); border: 1px solid var(--line);
    border-radius: var(--r); overflow: hidden;
    display: flex; flex-direction: column;
  }
  .img-preview {
    width: 100%; aspect-ratio: 1 / 1; object-fit: cover;
    background: var(--surface-2); display: block;
  }
  .img-preview.portrait { aspect-ratio: 2 / 3; object-fit: cover; }
  .img-preview.wide     { aspect-ratio: 16 / 9; }
  .img-preview.tall     { aspect-ratio: 4 / 5; }
  .img-placeholder {
    width: 100%; aspect-ratio: 1 / 1; background: var(--surface-2);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    gap: 8px; color: var(--ink-3); font-size: 12px;
    cursor: pointer; transition: background 120ms;
  }
  .img-placeholder.portrait { aspect-ratio: 2 / 3; }
  .img-placeholder.wide     { aspect-ratio: 16 / 9; }
  .img-placeholder.tall     { aspect-ratio: 4 / 5; }
  .img-placeholder:hover    { background: var(--accent-soft); color: var(--accent); }
  .img-card-footer {
    padding: 10px 12px; display: flex; align-items: center;
    justify-content: space-between; gap: 8px; border-top: 1px solid var(--line);
  }
  .img-card-label { font-size: 12px; font-weight: 600; color: var(--ink); }
  .img-card-sub   { font-size: 11px; color: var(--ink-3); margin-top: 2px; }
  .img-drop-overlay {
    position: absolute; inset: 0; background: rgba(45,107,255,0.12);
    border: 2px dashed var(--accent); border-radius: var(--r);
    display: none; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600; color: var(--accent);
  }
  .img-drop-overlay.active { display: flex; }

  /* ── Import/Export area ── */
  .import-area {
    border: 2px dashed var(--line); border-radius: var(--r); padding: 32px 24px;
    text-align: center; cursor: pointer; transition: border-color 120ms, background 120ms;
  }
  .import-area:hover, .import-area.drag-over {
    border-color: var(--accent); background: var(--accent-soft);
  }
  .import-area p { margin: 8px 0 0; font-size: 13px; color: var(--ink-2); }

  /* ── Status indicator ── */
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--success); flex-shrink: 0;
    box-shadow: 0 0 0 3px rgba(25,163,107,0.15);
  }
  .status-row { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--ink-3); }

  /* ── Responsive hide ── */
  @media (max-width: 680px) {
    .sidebar { display: none; }
    .main { margin-left: 0; }
    .content { padding: 20px; }
  }
</style>
</head>
<body>

<script>
/* ════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════ */
const STORAGE_KEY  = 'leon_portfolio_content';
const CASES_KEY    = 'leon_portfolio_cases';
const SECTION_TITLES = {
  profile: 'Profile', skills: 'Skills', clients: 'Clients & Logos',
  testimonials: 'Testimonials', images: 'Images',
  'work-cards': 'Work Cards', cases: 'Case Studies',
  contact: 'Contact', footer: 'Footer',
  'import-export': 'Import / Export',
};

let data = loadData();
let currentSection = 'profile';

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return getDefaults();
}

function getDefaults() {
  return {
    brand: { handle: "@leon", domain: "amezen-artworks.com" },
    nav: {
      EN: { info: "Info", work: "Work", contact: "Contact" },
      DE: { info: "Info", work: "Arbeit", contact: "Kontakt" }
    },
    info: {
      bio: {
        EN: "A Berlin-born, world-roaming Senior Art Director & Brand Designer with 9+ years of experience. I craft strategic identities, editorial visuals and digital experiences for brands that want to feel as good as they look.",
        DE: "Ein in Berlin geborener, weltreisender Senior Art Director & Brand Designer mit über 9 Jahren Erfahrung. Ich gestalte strategische Identitäten, editoriale Visuals und digitale Erlebnisse für Marken, die sich so gut anfühlen wollen, wie sie aussehen."
      },
      skills: ["Brand Identity","Web Design","Art Direction","Brand Strategy","Coaching","Webflow","Adobe CC"],
      clients: ["Ottokar","Maitiri Kakao","Joe Trenk","Caretable","neuweiss","Oakstone Hills"],
      clientLogos: [
        {name:"Maitiri Kakao",src:"https://cdn.prod.website-files.com/6907c8b3016fe09d35b2c028/69204b4a338d8b59f4724296_Maitiri.svg"},
        {name:"Ottokar",src:"https://cdn.prod.website-files.com/6907c8b3016fe09d35b2c028/690fcc5580636dddc01f62c2_Ottokar_Logo.svg"},
        {name:"Coco",src:"https://cdn.prod.website-files.com/6907c8b3016fe09d35b2c028/690fcc55464ab03718fc55b5_Coco_Logo.svg"},
        {name:"Joe Trenk",src:"https://cdn.prod.website-files.com/6907c8b3016fe09d35b2c028/691258c468928df48c5617c8_Joe-Trenk-fullname_vector.svg"},
        {name:"Caretable",src:"https://cdn.prod.website-files.com/6907c8b3016fe09d35b2c028/690fcd715e4ecda9ee76fb6e_Caretable_Logo.svg"},
        {name:"neuweiss",src:"https://cdn.prod.website-files.com/6907c8b3016fe09d35b2c028/691f810fc31be0cf8f322949_neuweiss.svg"}
      ],
      featured: ["oakstone","maitiri"],
      testimonials: [
        {name:"Clara Mendes",role:"Founder, Oakstone Hills",quote:{EN:"Leon understood our brand before we could explain it. The site feels exactly like the place does in person.",DE:"Leon hat unsere Marke verstanden, bevor wir sie erklären konnten. Die Seite fühlt sich genau so an wie der Ort selbst."}},
        {name:"Anika Roth",role:"Maitiri Kakao",quote:{EN:"Calm, clear and genuinely fun to work with. Our feed finally looks the way the cacao tastes.",DE:"Ruhig, klar und wirklich schön in der Zusammenarbeit. Unser Feed sieht endlich so aus, wie der Kakao schmeckt."}},
        {name:"Joe Trenk",role:"Leben Lehrt",quote:{EN:"He built my website twice without ever making me feel like a problem. Rare, and very Leon.",DE:"Er hat meine Website zweimal gebaut, ohne mir je das Gefühl zu geben, ein Problem zu sein. Selten, und sehr Leon."}}
      ]
    },
    work: {

════════════════════════════════════════════════════════ */
function showSection(id) {
  // collect current section before switching
  collectSection(currentSection);
  currentSection = id;

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.section === id));
  document.getElementById('topbar-title').textContent = SECTION_TITLES[id] || id;
  renderSection(id);
}

/* ════════════════════════════════════════════════════════
   RENDER SECTIONS
════════════════════════════════════════════════════════ */
function renderSection(id) {
  const el = document.getElementById('content-area');
  switch(id) {
    case 'images':        el.innerHTML = renderImages(); bindImageSection(); break;
    case 'profile':       el.innerHTML = renderProfile(); break;
    case 'skills':        el.innerHTML = renderSkills(); break;
    case 'clients':       el.innerHTML = renderClients(); break;
    case 'testimonials':  el.innerHTML = renderTestimonials(); break;
    case 'work-cards':    el.innerHTML = renderWorkCards(); break;
    case 'cases':         el.innerHTML = renderCases(); activateCaseTab(Object.keys(data.cases||{})[0]); break;
    case 'contact':       el.innerHTML = renderContact(); break;
    case 'footer':        el.innerHTML = renderFooter(); break;
    case 'import-export': el.innerHTML = renderImportExport(); bindImportExport(); break;
  }
  bindTagInputs();
}

  renderCaseEditor(id);
}

/* ════════════════════════════════════════════════════════
   COLLECT FORM DATA (read DOM → update data object)
════════════════════════════════════════════════════════ */
function collectSection(id) {
  const g = (sel) => { const el = document.getElementById(sel); return el ? el.value : null; };
  const tags = (tid) => {
    const el = document.getElementById(tid);
    return el ? JSON.parse(el.dataset.tags || '[]') : null;
  };

  if (id === 'profile') {
    if (g('bio-en') !== null) data.info.bio.EN = g('bio-en');
    if (g('bio-de') !== null) data.info.bio.DE = g('bio-de');
    if (g('status-line') !== null) data.statusLine = g('status-line');
    if (g('nav-info-en') !== null) { data.nav.EN.info = g('nav-info-en'); data.nav.DE.info = g('nav-info-de'); data.nav.EN.work = g('nav-work-en'); data.nav.DE.work = g('nav-work-de'); data.nav.EN.contact = g('nav-contact-en'); data.nav.DE.contact = g('nav-contact-de'); }
  }
  if (id === 'skills') {
    const s = tags('skills-tag-input'); if (s) data.info.skills = s;
    const fcb = document.getElementById('featured-checkboxes');
    if (fcb) data.info.featured = Array.from(fcb.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
  }
  if (id === 'work-cards') {
    if (g('nda-note-en') !== null) { data.work.note.EN = g('nda-note-en'); data.work.note.DE = g('nda-note-de'); }
    data.work.cases.forEach((c, i) => {
      const t = tags('wc-tags-' + i); if (t) c.tags = t;
    });
  }
  if (id === 'contact') {
    if (g('contact-headline-en') !== null) {
      data.contact.headline.EN = g('contact-headline-en');
      data.contact.headline.DE = g('contact-headline-de');
      data.contact.sub.EN = g('contact-sub-en');
      data.contact.sub.DE = g('contact-sub-de');
      data.contact.email = g('contact-email');
      data.contact.booking.href = g('contact-booking-href');
      data.contact.booking.label.EN = g('contact-booking-label-en');
      data.contact.booking.label.DE = g('contact-booking-label-de');
    }
  }
  if (id === 'footer') {
    if (g('footer-brand') !== null) {
      data.footer.tagline.EN = g('footer-tagline-en');
      data.footer.tagline.DE = g('footer-tagline-de');
      data.footer.brand = g('footer-brand');
      data.footer.instagram.handle = g('footer-ig-handle');
      data.footer.instagram.href = g('footer-ig-href');
      data.footer.email.value = g('footer-email');
    }
  }
}

/* ════════════════════════════════════════════════════════
   MUTATION HELPERS
════════════════════════════════════════════════════════ */
function updateLogo(i, key, val) { data.info.clientLogos[i][key] = val; }
function addLogo() {
  data.info.clientLogos.push({name:'',src:''});
  renderSection('clients');
}
function removeLogo(i) {
  data.info.clientLogos.splice(i, 1);
  renderSection('clients');
}

function updateTestimonial(i, key, val) {
  if (key === 'quoteEN') data.info.testimonials[i].quote.EN = val;
  else if (key === 'quoteDE') data.info.testimonials[i].quote.DE = val;
  else data.info.testimonials[i][key] = val;
  document.querySelector(`#testimonial-${i} .list-item-label`).textContent = data.info.testimonials[i].name || 'Testimonial '+(i+1);
}
function moveTestimonial(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= data.info.testimonials.length) return;
  [data.info.testimonials[i], data.info.testimonials[j]] = [data.info.testimonials[j], data.info.testimonials[i]];
  renderSection('testimonials');
}
function removeTestimonial(i) {
  data.info.testimonials.splice(i, 1);
  renderSection('testimonials');
}
function addTestimonial() {
  data.info.testimonials.push({name:'',role:'',quote:{EN:'',DE:''}});
  renderSection('testimonials');
}

function updateWorkCase(i, key, val) {
  if (key === 'descEN') data.work.cases[i].desc.EN = val;
  else if (key === 'descDE') data.work.cases[i].desc.DE = val;
  else data.work.cases[i][key] = val;
}
function moveWorkCase(i, dir) {
  const j = i + dir;
  if (j < 0 || j >= data.work.cases.length) return;
  [data.work.cases[i], data.work.cases[j]] = [data.work.cases[j], data.work.cases[i]];
  renderSection('work-cards');
}

function addWorkCard() {
  const id = 'case-' + Date.now();
  data.work.cases.push({ id, title: 'New Project', year: String(new Date().getFullYear()), tags: [], desc: { EN: '', DE: '' }, tone: 'moody' });
  if (!data.cases) data.cases = {};
  data.cases[id] = {
    id, title: 'New Project', tagline: '', year: String(new Date().getFullYear()),
    client: '', tone: 'moody', tags: [], services: [],
    background: '',
    challenge: { intro: '', items: [] },
    approach: [],
    result: { intro: '', outcomes: [], closing: '' }
  };
  renderSection('work-cards');
  showToast('New project added — edit it here, then go to Case Studies to fill in the detail page.');
}

function deleteWorkCard(i) {
  if (!confirm('Delete this work card? The case study page will also be removed.')) return;
  const id = data.work.cases[i].id;
  data.work.cases.splice(i, 1);
  if (data.cases) delete data.cases[id];
  data.info.featured = (data.info.featured || []).filter(f => f !== id);
  renderSection('work-cards');
  showToast('Work card deleted.');
}

// Case study mutations
function updateCase(id, key, val) { if (data.cases[id]) data.cases[id][key] = val; }
function updateCaseChallenge(id, key, val) { if (data.cases[id]) data.cases[id].challenge[key] = val; }
function updateCaseResult(id, key, val) { if (data.cases[id]) data.cases[id].result[key] = val; }

function updateChallengeItem(id, ii, val) { data.cases[id].challenge.items[ii] = val; }
function removeChallengeItem(id, ii) { data.cases[id].challenge.items.splice(ii, 1); renderCaseEditor(id); }
function addChallengeItem(id) { data.cases[id].challenge.items.push(''); renderCaseEditor(id); }

function updateApproachGroup(id, gi, key, val) { data.cases[id].approach[gi][key] = val; }
function addApproachGroup(id) { data.cases[id].approach.push({group:'',items:['']}); renderCaseEditor(id); }
function removeApproachGroup(id, gi) { data.cases[id].approach.splice(gi,1); renderCaseEditor(id); }
function updateApproachItem(id, gi, ii, val) { data.cases[id].approach[gi].items[ii] = val; }
function addApproachItem(id, gi) { data.cases[id].approach[gi].items.push(''); renderCaseEditor(id); }
function removeApproachItem(id, gi, ii) { data.cases[id].approach[gi].items.splice(ii,1); renderCaseEditor(id); }

function updateOutcome(id, ii, val) { data.cases[id].result.outcomes[ii] = val; }
function addOutcome(id) { data.cases[id].result.outcomes.push(''); renderCaseEditor(id); }
function removeOutcome(id, ii) { data.cases[id].result.outcomes.splice(ii,1); renderCaseEditor(id); }

function updateService(id, si, val) { data.cases[id].services[si] = val; }
function addService(id) { data.cases[id].services.push(''); renderCaseEditor(id); }
function removeService(id, si) { data.cases[id].services.splice(si,1); renderCaseEditor(id); }

function addCase() {
  const id = 'case-' + Date.now();
  if (!data.cases) data.cases = {};
  data.cases[id] = {
    id, title: 'New Case Study', tagline: '', year: String(new Date().getFullYear()),
    client: '', tone: 'moody', tags: [], services: [],
    background: '',
    challenge: { intro: '', items: [] },
    approach: [],
    result: { intro: '', outcomes: [], closing: '' }
  };
  // Also add a matching work card if not already there
  if (!data.work.cases.find(c => c.id === id)) {
    data.work.cases.push({ id, title: 'New Case Study', year: String(new Date().getFullYear()), tags: [], desc: { EN: '', DE: '' }, tone: 'moody' });
  }
  renderSection('cases');
  activateCaseTab(id);
  showToast('New case study created. Fill in the details and save.');
}

function deleteCase(id) {
  if (!confirm(`Delete the case study "${data.cases[id] ? data.cases[id].title : id}"? This will also remove it from Work Cards.`)) return;
  if (data.cases) delete data.cases[id];
  data.work.cases = (data.work.cases || []).filter(c => c.id !== id);
  data.info.featured = (data.info.featured || []).filter(f => f !== id);
  activeCaseId = null;
  renderSection('cases');
  const remaining = Object.keys(data.cases || {});
  if (remaining.length) activateCaseTab(remaining[0]);
  showToast('Case study deleted.');
}

function updateFeatured() {
  const fcb = document.getElementById('featured-checkboxes');
  if (fcb) data.info.featured = Array.from(fcb.querySelectorAll('input[type=checkbox]:checked')).map(cb => cb.value);
}

/* ════════════════════════════════════════════════════════
   TAG INPUT
════════════════════════════════════════════════════════ */
function tagChip(value) {
  return `<span class="tag-chip">${esc(value)}<button type="button" onclick="removeTag(this)" data-val="${esc(value)}">×</button></span>`;
}
function tagKeydown(e, containerId) {
  if (e.key === 'Enter' || e.key === 'Tab') {
    e.preventDefault();
    const val = e.target.value.trim();
    if (!val) return;
    const container = document.getElementById(containerId);
    const tags = JSON.parse(container.dataset.tags || '[]');
    if (!tags.includes(val)) {
      tags.push(val);
      container.dataset.tags = JSON.stringify(tags);
      const chip = document.createElement('span');
      chip.className = 'tag-chip';
      chip.innerHTML = `${esc(val)}<button type="button" onclick="removeTag(this)" data-val="${esc(val)}">×</button>`;
      container.insertBefore(chip, e.target);
    }
    e.target.value = '';
  }
}
function removeTag(btn) {
  const container = btn.closest('.tags-input');
  const val = btn.dataset.val;
  const tags = JSON.parse(container.dataset.tags || '[]').filter(t => t !== val);
  container.dataset.tags = JSON.stringify(tags);
  btn.closest('.tag-chip').remove();
}
function bindTagInputs() {}

/* ════════════════════════════════════════════════════════
   SAVE / LOAD
════════════════════════════════════════════════════════ */
function saveAll() {
  collectSection(currentSection);
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    setStatus(true, 'Changes saved');
    showToast('Saved — reload the portfolio to see changes');
  } catch(e) {
    setStatus(false, 'Save failed');
    showToast('Error saving: ' + e.message);
  }
}

function resetToDefaults() {
  if (!confirm('Reset all content to defaults? This will overwrite your edits.')) return;
  data = getDefaults();
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  renderSection(currentSection);
  showToast('Reset to defaults');
}

function setStatus(ok, msg) {
  document.getElementById('status-dot').style.background = ok ? 'var(--success)' : 'var(--danger)';
  document.getElementById('status-text').textContent = msg;
}

/* ════════════════════════════════════════════════════════
   IMPORT / EXPORT
════════════════════════════════════════════════════════ */
function exportJSON() {
  collectSection(currentSection);
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'content.json';
  a.click();
  setTimeout(() => URL.revokeObjectURL(a.href), 1000);
}

function importJSON(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (e) => {
    try {
      const imported = JSON.parse(e.target.result);
      if (!imported.info && !imported.work && !imported.contact) throw new Error('Unrecognised format');
      data = imported;
      if (!data.cases) data.cases = getDefaultCases();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      renderSection(currentSection);
      showToast('Imported successfully');
    } catch(err) {
      showToast('Import failed: ' + err.message);
    }
  };
  reader.readAsText(file);
  input.value = '';
}

function bindImportExport() {
  const area = document.getElementById('import-area');
  if (!area) return;
  area.addEventListener('dragover', e => { e.preventDefault(); area.classList.add('drag-over'); });
  area.addEventListener('dragleave', () => area.classList.remove('drag-over'));
  area.addEventListener('drop', e => {
    e.preventDefault(); area.classList.remove('drag-over');
    const f = e.dataTransfer.files[0];
    if (!f) return;
    const fakeInput = {files:[f]};
    importJSON(fakeInput);
  });
}

/* ════════════════════════════════════════════════════════
   TOAST
════════════════════════════════════════════════════════ */
let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('visible');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('visible'), 2500);
}

/* ════════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════════ */
function esc(s) {
  if (s == null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

/* ════════════════════════════════════════════════════════
   IMAGES
════════════════════════════════════════════════════════ */

// Computed dynamically from data.cases so new cases automatically get slots
function getImageSlots() {
  const groups = [
    { group: 'Profile', slots: [
      { id: 'leon-portrait', label: 'Portrait', ratio: 'portrait', hint: 'B&W portrait — 2:3' },
    ]},
    { group: 'Info — Featured cards', slots:
      Object.values(data.cases || {}).map(c => ({
        id: 'feat-' + c.id, label: c.title, ratio: 'portrait', hint: 'Featured thumbnail',
      }))
    },
    { group: 'Work cards', slots:
      (data.work.cases || []).map(c => ({
        id: 'work-' + c.id, label: c.title, ratio: '', hint: 'Work card thumbnail',
      }))
    },
  ];
  // One group per case study
  for (const c of Object.values(data.cases || {})) {
    groups.push({ group: 'Case study — ' + c.title, slots: [
      { id: c.id + '-cover',     label: 'Hero',      ratio: 'wide', hint: '16:9 hero image' },
      { id: c.id + '-gallery-1', label: 'Gallery 1', ratio: 'tall', hint: '4:5 gallery image' },
      { id: c.id + '-gallery-2', label: 'Gallery 2', ratio: 'tall', hint: '4:5 gallery image' },
    ]});
  }
  return groups;
}

const LS_IMG_KEY = 'leon_image_slots';

function loadImageSlots() {
  try {
    const raw = localStorage.getItem(LS_IMG_KEY);
    return raw ? JSON.parse(raw) : {};
  } catch(e) { return {}; }
}

function saveImageSlot(id, dataUrl) {
  const slots = loadImageSlots();
  slots[id] = { u: dataUrl, s: 1, x: 0, y: 0 };
  localStorage.setItem(LS_IMG_KEY, JSON.stringify(slots));
  // Also register the file path in content data so it travels with content.json
  if (!data.images) data.images = {};
  data.images[id] = 'images/' + id + '.webp';
}

function clearImageSlot(id) {
  const slots = loadImageSlots();
  delete slots[id];
  localStorage.setItem(LS_IMG_KEY, JSON.stringify(slots));
  // Remove from content images map too
  if (data.images) delete data.images[id];
  refreshImageCard(id);
  showToast('Image removed');
}

function downloadImageFile(id) {
  const slots = loadImageSlots();
  const entry = slots[id];
  const url = entry && entry.u ? entry.u : (typeof entry === 'string' ? entry : null);
  if (!url) { showToast('No image uploaded yet for this slot.'); return; }
  const a = document.createElement('a');
  a.href = url;
  a.download = id + '.webp';
  a.click();
}

function downloadAllImages() {
  const slots = loadImageSlots();
  const ids = Object.keys(slots);
  if (!ids.length) { showToast('No images uploaded yet.'); return; }
  let count = 0;
  ids.forEach((id, i) => {
    const entry = slots[id];
    const url = entry && entry.u ? entry.u : (typeof entry === 'string' ? entry : null);
    if (!url) return;
    setTimeout(() => {
      const a = document.createElement('a');
      a.href = url;
      a.download = id + '.webp';
      a.click();
      count++;
    }, i * 200); // slight delay so browser doesn't block multiple downloads
  });
  showToast('Downloading ' + ids.length + ' images — save them all into your images/ folder.');
}

function refreshImageCard(id) {
  const slots = loadImageSlots();
  const entry = slots[id];
  const url = entry && entry.u ? entry.u : (entry && typeof entry === 'string' ? entry : null);
  const container = document.querySelector(`[data-slot-id="${id}"]`);
  if (!container) return;
  const ratioClass = container.dataset.ratio || '';
  if (url) {
    container.innerHTML = `
      <img class="img-preview ${ratioClass}" src="${url}" alt="" />
      <div class="img-card-footer">
        <div>
          <div class="img-card-label">${esc(container.dataset.label)}</div>
          <div class="img-card-sub">${esc(container.dataset.hint)}</div>
        </div>
        <div style="display:flex;gap:6px">
          <button class="btn-icon" title="Replace image" onclick="triggerUpload('${id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </button>
          <button class="btn-icon" title="Remove image" onclick="clearImageSlot('${id}')">
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
          </button>
        </div>
      </div>`;
  } else {
    container.innerHTML = `
      <div class="img-placeholder ${ratioClass}" onclick="triggerUpload('${id}')">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
        <span>Click or drop image</span>
      </div>
      <div class="img-card-footer">
        <div>
          <div class="img-card-label">${esc(container.dataset.label)}</div>
          <div class="img-card-sub">${esc(container.dataset.hint)}</div>
        </div>
      </div>`;
  }
}

function renderImages() {
  const slots = loadImageSlots();
  let html = '';
  for (const group of getImageSlots()) {
    html += `<div class="section"><div class="section-title">${esc(group.group)}</div><div class="img-grid">`;
    for (const s of group.slots) {
      const entry = slots[s.id];
      const url = entry && entry.u ? entry.u : (entry && typeof entry === 'string' ? entry : null);
      const ratioClass = s.ratio || '';
      html += `<div class="img-card" data-slot-id="${esc(s.id)}" data-label="${esc(s.label)}" data-hint="${esc(s.hint)}" data-ratio="${esc(s.ratio)}">`;
      if (url) {
        html += `
          <img class="img-preview ${ratioClass}" src="${url}" alt="" />
          <div class="img-card-footer">
            <div>
              <div class="img-card-label">${esc(s.label)}</div>
              <div class="img-card-sub">${esc(s.hint)}</div>
            </div>
            <div style="display:flex;gap:6px">
              <button class="btn-icon" title="Download file (save to images/ folder)" onclick="downloadImageFile('${esc(s.id)}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              </button>
              <button class="btn-icon" title="Replace image" onclick="triggerUpload('${esc(s.id)}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              </button>
              <button class="btn-icon" title="Remove image" onclick="clearImageSlot('${esc(s.id)}')">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/></svg>
              </button>
            </div>
          </div>`;
      } else {
        html += `
          <div class="img-placeholder ${ratioClass}" onclick="triggerUpload('${esc(s.id)}')">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg>
            <span>Click or drop image</span>
          </div>
          <div class="img-card-footer">
            <div>
              <div class="img-card-label">${esc(s.label)}</div>
              <div class="img-card-sub">${esc(s.hint)}</div>
            </div>
          </div>`;
      }
      html += `</div>`;
    }
    html += `</div></div>`;
  }
  // Hidden file input
  html += `<input type="file" id="img-file-input" accept="image/png,image/jpeg,image/webp,image/avif" style="display:none" onchange="handleImageFile(this)" />`;
  return html;
}

let _uploadTargetId = null;

function triggerUpload(slotId) {
  _uploadTargetId = slotId;
  document.getElementById('img-file-input').click();
}

function handleImageFile(input) {
  const file = input.files[0];
  if (!file || !_uploadTargetId) return;
  input.value = '';
  const id = _uploadTargetId;
  _uploadTargetId = null;
  resizeAndStore(file, id);
}

function resizeAndStore(file, id) {
  const MAX = 1400;
  const reader = new FileReader();
  reader.onload = (e) => {
    const img = new Image();
    img.onload = () => {
      const scale = Math.min(1, MAX / Math.max(img.width, img.height));
      const w = Math.round(img.width * scale);
      const h = Math.round(img.height * scale);
      const canvas = document.createElement('canvas');
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      const dataUrl = canvas.toDataURL('image/webp', 0.88);
      saveImageSlot(id, dataUrl);
      refreshImageCard(id);
      showToast('Image saved — reload the portfolio to see it');
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

function bindImageSection() {
  // Enable drag-and-drop onto each image card
  document.querySelectorAll('.img-card').forEach(card => {
    card.addEventListener('dragover', e => { e.preventDefault(); card.style.outline = '2px dashed var(--accent)'; });
    card.addEventListener('dragleave', () => { card.style.outline = ''; });
    card.addEventListener('drop', e => {
      e.preventDefault(); card.style.outline = '';
      const file = e.dataTransfer.files[0];
      if (!file || !file.type.startsWith('image/')) return;
      resizeAndStore(file, card.dataset.slotId);
    });
  });
}

/* Auto-save every 30s */
setInterval(() => { collectSection(currentSection); localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); setStatus(true,'Auto-saved'); }, 30000);

/* Sync image paths: any image already in localStorage gets its path registered in data.images */
(function syncImagePaths() {
  const slots = loadImageSlots();
  if (!data.images) data.images = {};
  for (const id of Object.keys(slots)) {
    if (!data.images[id]) data.images[id] = 'images/' + id + '.webp';
  }
})();

/* Init */
renderSection('profile');
